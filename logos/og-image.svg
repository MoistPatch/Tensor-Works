<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627" role="img" aria-label="TensorWorks — Custom AI Systems">
  <title>TensorWorks — Custom AI Systems · OEM · ODM · Australia</title>
  <!-- Background -->
  <rect width="1200" height="627" fill="#090e10"/>
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1F5C99" stroke-width="0.4" opacity="0.15"/>
    </pattern>
    <radialGradient id="glow" cx="70%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#1F5C99" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#090e10" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="627" fill="url(#grid)"/>
  <rect width="1200" height="627" fill="url(#glow)"/>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="5" height="627" fill="#76B900"/>
  <!-- Logo mark (right side, large) -->
  <g transform="translate(720, 80) scale(4.5)">
    <line x1="50" y1="50" x2="50" y2="20" stroke="#1F5C99" stroke-width="2.2" stroke-linecap="round" opacity="0.55"/>
    <line x1="50" y1="50" x2="76" y2="35" stroke="#1F5C99" stroke-width="2.2" stroke-linecap="round" opacity="0.55"/>
    <line x1="50" y1="50" x2="76" y2="65" stroke="#1F5C99" stroke-width="2.2" stroke-linecap="round" opacity="0.55"/>
    <line x1="50" y1="50" x2="50" y2="80" stroke="#1F5C99" stroke-width="2.2" stroke-linecap="round" opacity="0.55"/>
    <line x1="50" y1="50" x2="24" y2="65" stroke="#1F5C99" stroke-width="2.2" stroke-linecap="round" opacity="0.55"/>
    <line x1="50" y1="50" x2="24" y2="35" stroke="#1F5C99" stroke-width="2.2" stroke-linecap="round" opacity="0.55"/>
    <polygon points="50,20 76,35 76,65 50,80 24,65 24,35" fill="none" stroke="#76B900" stroke-width="1.2" opacity="0.3"/>
    <circle cx="50" cy="20" r="7.5" fill="#76B900"/>
    <circle cx="76" cy="35" r="7.5" fill="#76B900"/>
    <circle cx="76" cy="65" r="7.5" fill="#76B900"/>
    <circle cx="50" cy="80" r="7.5" fill="#76B900"/>
    <circle cx="24" cy="65" r="7.5" fill="#76B900"/>
    <circle cx="24" cy="35" r="7.5" fill="#76B900"/>
    <circle cx="50" cy="50" r="19" fill="#1F5C99" opacity="0.18"/>
    <circle cx="50" cy="50" r="15" fill="#1F5C99"/>
    <circle cx="50" cy="50" r="8" fill="#2D7EC4" opacity="0.55"/>
    <circle cx="46" cy="46" r="3.5" fill="#fff" opacity="0.22"/>
  </g>
  <!-- Text content (left side) -->
  <!-- Eyebrow -->
  <rect x="80" y="140" width="220" height="28" rx="14" fill="#1F5C99" opacity="0.2"/>
  <rect x="80" y="140" width="220" height="28" rx="14" fill="none" stroke="#1F5C99" stroke-width="1" opacity="0.6"/>
  <text x="100" y="159" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#76B900">CUSTOM AI SYSTEMS</text>
  <!-- Headline -->
  <text x="80" y="230" font-family="Inter, Arial, sans-serif" font-size="68" font-weight="900" fill="#ffffff" letter-spacing="-1">Tensor<tspan fill="#1F5C99">Works</tspan></text>
  <text x="80" y="300" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="400" fill="#8fa8b2">We Build the Machines</text>
  <text x="80" y="340" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="400" fill="#8fa8b2">That Run Serious AI.</text>
  <!-- Divider -->
  <line x1="80" y1="375" x2="400" y2="375" stroke="#76B900" stroke-width="2" opacity="0.6"/>
  <!-- Capability pills -->
  <rect x="80" y="395" width="100" height="30" rx="15" fill="#1F5C99" opacity="0.25"/>
  <text x="130" y="415" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#e2eaed" text-anchor="middle">OEM / ODM</text>
  <rect x="192" y="395" width="130" height="30" rx="15" fill="#1F5C99" opacity="0.25"/>
  <text x="257" y="415" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#e2eaed" text-anchor="middle">LLM Inference</text>
  <rect x="334" y="395" width="130" height="30" rx="15" fill="#1F5C99" opacity="0.25"/>
  <text x="399" y="415" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#e2eaed" text-anchor="middle">Training Clusters</text>
  <!-- Footer -->
  <text x="80" y="575" font-family="Inter, Arial, sans-serif" font-size="14" fill="#4a6070">tensorworks.online · ABN 84 544 119 830 · Melbourne, Australia</text>
</svg>
