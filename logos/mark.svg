<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="TensorWorks logo mark">
  <title>TensorWorks</title>
  <!-- Spoke lines: center → each node -->
  <line x1="50" y1="50" x2="50" y2="20" stroke="#1F5C99" stroke-width="2.2" stroke-linecap="round" opacity="0.55"/>
  <line x1="50" y1="50" x2="76" y2="35" stroke="#1F5C99" stroke-width="2.2" stroke-linecap="round" opacity="0.55"/>
  <line x1="50" y1="50" x2="76" y2="65" stroke="#1F5C99" stroke-width="2.2" stroke-linecap="round" opacity="0.55"/>
  <line x1="50" y1="50" x2="50" y2="80" stroke="#1F5C99" stroke-width="2.2" stroke-linecap="round" opacity="0.55"/>
  <line x1="50" y1="50" x2="24" y2="65" stroke="#1F5C99" stroke-width="2.2" stroke-linecap="round" opacity="0.55"/>
  <line x1="50" y1="50" x2="24" y2="35" stroke="#1F5C99" stroke-width="2.2" stroke-linecap="round" opacity="0.55"/>
  <!-- Outer hexagon ring -->
  <polygon points="50,20 76,35 76,65 50,80 24,65 24,35" fill="none" stroke="#76B900" stroke-width="1.2" opacity="0.28"/>
  <!-- Outer nodes -->
  <circle cx="50" cy="20" r="7.5" fill="#76B900"/>
  <circle cx="76" cy="35" r="7.5" fill="#76B900"/>
  <circle cx="76" cy="65" r="7.5" fill="#76B900"/>
  <circle cx="50" cy="80" r="7.5" fill="#76B900"/>
  <circle cx="24" cy="65" r="7.5" fill="#76B900"/>
  <circle cx="24" cy="35" r="7.5" fill="#76B900"/>
  <!-- Central core glow -->
  <circle cx="50" cy="50" r="19" fill="#1F5C99" opacity="0.18"/>
  <!-- Central core -->
  <circle cx="50" cy="50" r="15" fill="#1F5C99"/>
  <!-- Core inner highlight -->
  <circle cx="50" cy="50" r="8" fill="#2D7EC4" opacity="0.55"/>
  <circle cx="46" cy="46" r="3.5" fill="#fff" opacity="0.22"/>
</svg>
