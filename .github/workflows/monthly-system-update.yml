name: Monthly System Update

on:
  schedule:
    - cron: '0 4 1 * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Run monthly system update
        run: |
          SITE="${{ vars.SITE_URL || 'https://tensorworks.online' }}"
          STATUS=$(curl -s -o /tmp/update.json -w "%{http_code}" \
            -X POST "${SITE}/api/system-update" \
            -H "Content-Type: application/json" -d '{}')
          echo "System update HTTP ${STATUS}"
          cat /tmp/update.json
          if [ "$STATUS" -ge 500 ]; then
            echo "System update returned ${STATUS}"
            exit 1
          fi
