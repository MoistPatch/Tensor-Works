name: Daily Competitor Crawl
# Superseded by daily-pipeline.yml — kept for manual dispatch only

on:
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger competitor crawl
        run: |
          SITE="${{ vars.SITE_URL || 'https://tensorworks.online' }}"
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRAWL_SECRET }}" \
            -H "Content-Type: application/json" \
            "${SITE}/api/competitor-crawl" --max-time 55)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Crawl failed"
            exit 1
          fi
