name: Daily Intelligence
# Superseded by daily-pipeline.yml — kept for manual dispatch only

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Run intelligence analysis
        run: |
          SITE="${{ vars.SITE_URL || 'https://tensorworks.online' }}"
          STATUS=$(curl -s -o /tmp/intel.json -w "%{http_code}" \
            -X POST "${SITE}/api/intelligence" \
            -H "Content-Type: application/json" -d '{}' --max-time 55)
          echo "Intelligence HTTP ${STATUS}"
          cat /tmp/intel.json
          if [ "$STATUS" -ge 500 ]; then
            echo "Intelligence returned ${STATUS}"
            exit 1
          fi
