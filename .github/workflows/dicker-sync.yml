name: Dicker Data Hourly Sync

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Dicker Data sync
        run: |
          STATUS=$(curl -sf -o /tmp/sync-response.json -w "%{http_code}" \
            -X POST "${{ vars.SITE_URL }}/api/dicker-sync" \
            -H "X-Sync-Secret: ${{ secrets.SYNC_SECRET }}" \
            -H "Content-Type: application/json")
          cat /tmp/sync-response.json
          if [ "$STATUS" -ge 400 ]; then
            echo "Sync endpoint returned $STATUS"
            exit 1
          fi
