name: Dicker Data Hourly Sync

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check configuration
        id: check
        run: |
          if [ -z "${{ vars.SITE_URL }}" ]; then
            echo "SITE_URL not configured — skipping sync"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Dicker Data sync
        if: steps.check.outputs.skip == 'false'
        run: |
          SITE="${{ vars.SITE_URL }}"
          SECRET="${{ secrets.SYNC_SECRET }}"
          STATUS=$(curl -s -o /tmp/sync-response.json -w "%{http_code}" \
            -X POST "${SITE}/api/dicker-sync" \
            -H "X-Sync-Secret: ${SECRET}" \
            -H "Content-Type: application/json")
          echo "HTTP ${STATUS}"
          cat /tmp/sync-response.json
          if [ "$STATUS" -ge 500 ]; then
            echo "Server error ${STATUS} — sync failed"
            exit 1
          fi
