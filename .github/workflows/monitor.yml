name: Hourly Monitor

on:
  schedule:
    - cron: '30 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Run health monitor
        run: |
          SITE="${{ vars.SITE_URL || 'https://tensorworks.online' }}"
          STATUS=$(curl -s -o /tmp/monitor.json -w "%{http_code}" \
            -X POST "${SITE}/api/monitor" \
            -H "Content-Type: application/json" -d '{}')
          echo "Monitor HTTP ${STATUS}"
          cat /tmp/monitor.json
          if [ "$STATUS" -ge 500 ]; then
            echo "Monitor returned ${STATUS}"
            exit 1
          fi
