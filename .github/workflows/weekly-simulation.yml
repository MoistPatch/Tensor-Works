name: Weekly Deep Simulation
on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:
jobs:
  simulate:
    runs-on: ubuntu-latest
    steps:
      - name: Run simulation engine
        run: |
          curl -sf -X POST "${{ vars.SITE_URL }}/api/simulate" \
            -H "X-Sync-Secret: ${{ secrets.SYNC_SECRET }}" \
            -H "Content-Type: application/json" \
            -o /tmp/sim.json && cat /tmp/sim.json || echo "Simulation failed"
