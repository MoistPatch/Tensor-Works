name: Weekly Simulation

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Run all simulations
        run: |
          SITE="${{ vars.SITE_URL || 'https://tensorworks.online' }}"
          STATUS=$(curl -s -o /tmp/sim.json -w "%{http_code}" \
            -X POST "${SITE}/api/simulate" \
            -H "Content-Type: application/json" -d '{}')
          echo "Simulate HTTP ${STATUS}"
          cat /tmp/sim.json
          if [ "$STATUS" -ge 500 ]; then
            echo "Simulation returned ${STATUS}"
            exit 1
          fi
