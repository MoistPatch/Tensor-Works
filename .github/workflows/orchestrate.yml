name: Daily Orchestration

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Run full agent pipeline
        run: |
          SITE="${{ vars.SITE_URL || 'https://tensorworks.online' }}"
          STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "${SITE}/api/orchestrate" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "HTTP ${STATUS}"
          cat /tmp/response.json
          if [ "$STATUS" -ge 500 ]; then
            echo "Orchestration returned ${STATUS}"
            exit 1
          fi
