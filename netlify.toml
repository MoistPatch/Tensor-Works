[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; script-src 'self' 'unsafe-inline'; connect-src 'self' https://api.web3forms.com; img-src 'self' data:;"

[[redirects]]
  from = "http://tensorworks.online/*"
  to   = "https://tensorworks.online/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.tensorworks.online/*"
  to   = "https://www.tensorworks.online/:splat"
  status = 301
  force = true
