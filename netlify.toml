[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; script-src 'self' 'unsafe-inline'; connect-src 'self' https://api.web3forms.com https://*.myshopify.com /api/; img-src 'self' data: https://cdn.shopify.com;"

[[redirects]]
  from = "http://tensorworks.online/*"
  to   = "https://tensorworks.online/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.tensorworks.online/*"
  to   = "https://www.tensorworks.online/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/products"
  to   = "/products.html"
  status = 200

[[redirects]]
  from = "/cart"
  to   = "/cart.html"
  status = 200

[[redirects]]
  from = "/account"
  to   = "/account.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to   = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to   = "/terms.html"
  status = 200
